<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生信息管理系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 系统标题 -->
        <h1 class="system-title">学生信息管理系统</h1>

        <!-- 功能按钮区 -->
        <div class="btn-group">
            <button id="add-btn" class="btn add-btn">新增</button>
            <button id="delete-btn" class="btn delete-btn">删除</button>
        </div>

        <!-- 学生信息表格 -->
        <div class="table-wrapper">
            <table class="student-table">
                <thead>
                    <tr>
                        <th><input type="checkbox" id="select-all"></th>
                        <th>序号</th>
                        <th>学号</th>
                        <th>姓名</th>
                        <th>学院</th>
                        <th>专业</th>
                        <th>年级</th>
                        <th>班级</th>
                        <th>年龄</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="student-tbody"></tbody>
            </table>
        </div>

        <!-- 分页控件 -->
        <div class="pagination">
            <div class="page-info" id="page-info">
                第1页，共0条，(每页显示10条)
            </div>
            <div class="page-btn-group">
                <button id="prev-page" class="btn page-btn">上一页</button>
                <button id="next-page" class="btn page-btn">下一页</button>
            </div>
        </div>
    </div>

    <!-- 新增/修改/查看模态框 -->
    <div id="operate-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">新增学生信息</h2>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="operate-form">
                    <input type="hidden" id="operate-type" value="add">
                    <input type="hidden" id="current-id">

                    <div class="form-group">
                        <label for="stu-name">姓名</label>
                        <input type="text" id="stu-name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="stu-gender">性别</label>
                        <select id="stu-gender" class="form-input" required>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="stu-age">年龄</label>
                        <input type="number" id="stu-age" class="form-input" min="15" max="30" required>
                    </div>
                    <div class="form-group">
                        <label for="stu-phone">手机号</label>
                        <input type="tel" id="stu-phone" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="stu-class">班级ID</label>
                        <input type="number" id="stu-class" class="form-input" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button id="cancel-btn" class="btn cancel-btn">取消</button>
                <button id="save-btn" class="btn save-btn">保存</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
