<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>学生管理系统</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1 class="system-title">
        学生管理系统
    </h1>

    <div class="btn-group">
        <button class="btn add-btn">
            新增
        </button>

        <button class="btn delete-btn">
            删除
        </button>
    </div>

    <div class="table-wrapper">

        <table class="student-table">

            <thead>

            <tr>
                <th>
                    <input type="checkbox">
                </th>

                <th>ID</th>
                <th>姓名</th>
                <th>性别</th>
                <th>年龄</th>
                <th>手机号</th>
                <th>班级ID</th>
                <th>操作</th>
            </tr>

            </thead>

            <tbody id="studentBody">

            </tbody>

        </table>

    </div>

    <div class="pagination">

        <div class="page-info">
            学生列表
        </div>

        <div class="page-btn-group">

            <button class="btn page-btn">
                上一页
            </button>

            <button class="btn page-btn">
                下一页
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
